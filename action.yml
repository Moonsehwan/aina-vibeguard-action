name: 'VibeGuard Security Scanner'
description: 'AST-based scanner for AI-generated Python code. 13 vuln types. Never misses a real one.'
author: 'AINA Sovereign'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  api-key:
    description: 'VibeGuard API key (get free key at vibeguard.dev)'
    required: true
  scan-path:
    description: 'File or directory to scan'
    default: '.'
  fail-on-block:
    description: 'Fail the workflow when security blocks are found'
    default: 'true'
  agent-friendly:
    description: 'Output JSON+Markdown with before/after code and fix instructions'
    default: 'false'
  max-files:
    description: 'Maximum number of Python files to scan per run'
    default: '200'

outputs:
  blocks:
    description: 'Number of BLOCK-severity security issues found (1 = found, 0 = clear)'
    value: ${{ steps.scan.outputs.blocks }}

runs:
  using: 'composite'
  steps:
    - name: Install VibeGuard
      shell: bash
      run: pip install aina-vibeguard --quiet

    - name: Configure API key
      shell: bash
      run: aina-vibeguard config --key "${{ inputs.api-key }}"

    - name: Scan Python files
      id: scan
      shell: bash
      run: |
        SCAN_PATH="${{ inputs.scan-path }}"
        FAIL_ON_BLOCK="${{ inputs.fail-on-block }}"
        AGENT_FRIENDLY="${{ inputs.agent-friendly }}"
        MAX_FILES="${{ inputs.max-files }}"
        EXIT_CODE=0

        echo "::group::VibeGuard — collecting files"
        if [ -f "$SCAN_PATH" ]; then
          FILES="$SCAN_PATH"
        else
          FILES=$(find "$SCAN_PATH" \
            -name "*.py" \
            -not -path "*/.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/site-packages/*" \
            | head -"$MAX_FILES")
        fi
        FILE_COUNT=$(echo "$FILES" | grep -c . 2>/dev/null || echo 0)
        echo "Files to scan: $FILE_COUNT"
        echo "::endgroup::"

        EXTRA_FLAGS=""
        if [ "$AGENT_FRIENDLY" = "true" ]; then
          EXTRA_FLAGS="--agent-friendly"
        fi

        for f in $FILES; do
          echo "::group::Scanning $f"
          aina-vibeguard scan "$f" $EXTRA_FLAGS || EXIT_CODE=1
          echo "::endgroup::"
        done

        echo "blocks=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" != "0" ]; then
          echo "::error::VibeGuard found security blocks. Fix before merging."
          echo "::notice::Run locally: pip install aina-vibeguard && aina-vibeguard scan <file> --agent-friendly"
        else
          echo "::notice::VibeGuard — all clear. 0 security blocks."
        fi

        if [ "$FAIL_ON_BLOCK" = "true" ] && [ "$EXIT_CODE" != "0" ]; then
          exit 1
        fi
