name: 'VibeGuard Security Scanner'
description: 'AST-based scanner for AI-generated code. 48 patterns (33 security + 15 vibe-coding), 9 languages.'
author: 'AINA Sovereign'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  api-key:
    description: 'VibeGuard API key (free: vg_free_test)'
    required: false
    default: 'vg_free_test'
  scan-path:
    description: 'File or directory to scan (.py .js .ts .go .rb .java .php .kt .c .cpp)'
    default: '.'
  fail-on-block:
    description: 'Fail the workflow when security blocks are found'
    default: 'true'
  max-files:
    description: 'Maximum number of files to scan per run'
    default: '50'

outputs:
  blocks:
    description: 'Number of BLOCK-severity issues found'
    value: ${{ steps.scan.outputs.blocks }}
  warns:
    description: 'Number of WARN-severity issues found'
    value: ${{ steps.scan.outputs.warns }}

runs:
  using: 'composite'
  steps:
    - name: VibeGuard Security Scan
      id: scan
      shell: bash
      run: |
        API_BASE="https://pleasing-transformation-production-90c2.up.railway.app"
        API_KEY="${{ inputs.api-key }}"
        SCAN_PATH="${{ inputs.scan-path }}"
        FAIL_ON_BLOCK="${{ inputs.fail-on-block }}"
        MAX_FILES="${{ inputs.max-files }}"
        TOTAL_BLOCKS=0
        TOTAL_WARNS=0
        FILE_COUNT=0

        if [ -f "$SCAN_PATH" ]; then
          FILES="$SCAN_PATH"
        else
          FILES=$(find "$SCAN_PATH" \
            \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" \
               -o -name "*.rb" -o -name "*.java" -o -name "*.php" -o -name "*.kt" \
               -o -name "*.c" -o -name "*.cpp" \) \
            -not -path "*/.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/site-packages/*" \
            | head -"$MAX_FILES")
        fi

        echo "::group::VibeGuard Scan"
        for f in $FILES; do
          [ -z "$f" ] && continue
          FILE_COUNT=$((FILE_COUNT + 1))

          RESPONSE=$(curl -sf -X POST "$API_BASE/v1/scan" \
            -H "X-API-Key: $API_KEY" \
            -F "file=@$f" 2>/dev/null) || {
            echo "::warning::API unreachable for $f — skipping"
            continue
          }

          BLOCKS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('blocks',0))" 2>/dev/null || echo 0)
          WARNS=$(echo "$RESPONSE"  | python3 -c "import sys,json; print(json.load(sys.stdin).get('warns',0))"  2>/dev/null || echo 0)
          TOTAL_BLOCKS=$((TOTAL_BLOCKS + BLOCKS))
          TOTAL_WARNS=$((TOTAL_WARNS + WARNS))

          if [ "$BLOCKS" -gt 0 ]; then
            echo "::error file=$f::VibeGuard: $BLOCKS block(s) in $f"
            echo "$RESPONSE" | python3 -c "
import sys,json
for i in json.load(sys.stdin).get('issues',[]):
    if i.get('severity')=='BLOCK':
        print(f\"  [{i['kind']}] L{i.get('line','?')}: {i.get('detail','')[:100]}\")
" 2>/dev/null || true
          fi
        done
        echo "::endgroup::"

        echo "blocks=$TOTAL_BLOCKS" >> "$GITHUB_OUTPUT"
        echo "warns=$TOTAL_WARNS"   >> "$GITHUB_OUTPUT"

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "VibeGuard: $FILE_COUNT files | BLOCK=$TOTAL_BLOCKS WARN=$TOTAL_WARNS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        if [ "$TOTAL_BLOCKS" -eq 0 ]; then
          echo "✅ All clear."
        else
          echo "🚨 $TOTAL_BLOCKS block(s) found."
          [ "$FAIL_ON_BLOCK" = "true" ] && exit 1
        fi
