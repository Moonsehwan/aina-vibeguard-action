name: 'VibeGuard Security Scanner'
description: 'AST-based scanner for AI-generated Python code. 13 vuln types. Never misses a real one.'
author: 'AINA Sovereign'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  api-key:
    description: 'VibeGuard API key'
    required: false
    default: 'vg_free_demo0001'
  scan-path:
    description: 'File or directory to scan'
    default: '.'
  fail-on-block:
    description: 'Fail the workflow when security blocks are found'
    default: 'true'
  agent-friendly:
    description: 'Output JSON+Markdown with before/after code and fix instructions'
    default: 'false'
  max-files:
    description: 'Maximum number of Python files to scan per run'
    default: '200'

outputs:
  blocks:
    description: 'Number of BLOCK-severity issues found (1=found, 0=clear)'
    value: ${{ steps.scan.outputs.blocks }}

runs:
  using: 'composite'
  steps:
    - name: Install VibeGuard
      shell: bash
      run: |
        pip install "aina-vibeguard>=1.9.3" --quiet 2>&1 || {
          echo "::warning::aina-vibeguard install failed — scan skipped"
          echo "VIBEGUARD_SKIP=true" >> "$GITHUB_ENV"
        }

    - name: Configure API key
      shell: bash
      run: |
        if [ "${VIBEGUARD_SKIP}" = "true" ]; then exit 0; fi
        aina-vibeguard config --key "${{ inputs.api-key }}" 2>&1 || {
          echo "::warning::aina-vibeguard config failed — scan skipped"
          echo "VIBEGUARD_SKIP=true" >> "$GITHUB_ENV"
        }

    - name: Scan Python files
      id: scan
      shell: bash
      run: |
        if [ "${VIBEGUARD_SKIP}" = "true" ]; then
          echo "::notice::VibeGuard scan skipped"
          echo "blocks=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        SCAN_PATH="${{ inputs.scan-path }}"
        FAIL_ON_BLOCK="${{ inputs.fail-on-block }}"
        MAX_FILES="${{ inputs.max-files }}"
        BLOCKS_FOUND=0

        echo "::group::VibeGuard — collecting files"
        if [ -f "$SCAN_PATH" ]; then
          FILES="$SCAN_PATH"
        else
          FILES=$(find "$SCAN_PATH" \
            -name "*.py" \
            -not -path "*/.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/site-packages/*" \
            | head -"$MAX_FILES" || true)
        fi
        FILE_COUNT=$(echo "$FILES" | grep -c . 2>/dev/null || echo 0)
        echo "Files to scan: $FILE_COUNT"
        echo "::endgroup::"

        EXTRA=""
        [ "${{ inputs.agent-friendly }}" = "true" ] && EXTRA="--agent-friendly"

        for f in $FILES; do
          [ -z "$f" ] && continue
          echo "::group::Scanning $f"
          OUTPUT=$(aina-vibeguard scan "$f" $EXTRA 2>&1) || true
          echo "$OUTPUT"
          # Only count as block if output explicitly says BLOCK (not API error)
          if echo "$OUTPUT" | grep -q "blocks=[1-9]"; then
            BLOCKS_FOUND=1
            echo "::error file=$f::VibeGuard: security blocks found in $f"
          fi
          echo "::endgroup::"
        done

        echo "blocks=$BLOCKS_FOUND" >> "$GITHUB_OUTPUT"

        if [ "$BLOCKS_FOUND" = "0" ]; then
          echo "::notice::VibeGuard — all clear. 0 security blocks."
        else
          echo "::warning::VibeGuard found security blocks."
          echo "::notice::Fix: aina-vibeguard scan <file> --agent-friendly"
          if [ "$FAIL_ON_BLOCK" = "true" ]; then
            exit 1
          fi
        fi
